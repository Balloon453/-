<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مقالات تعليمية - Fabrica</title>
  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(to right, #3f51b5, #9c27b0);
      color: #fff;
    }

    header {
      text-align: center;
      padding: 30px;
      font-size: 26px;
      font-weight: bold;
    }

    .articles-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20px;
    }

    .article-card {
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      max-width: 600px;
      width: 90%;
      transition: transform 0.3s;
    }

    .article-card:hover {
      transform: scale(1.03);
    }

    .article-card h3 {
      margin-top: 0;
      color: #ffeb3b;
    }

    .article-card a {
      display: inline-block;
      margin-top: 10px;
      color: #fff;
      text-decoration: underline;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      text-align: center;
      background: rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <header>مقالات تعليمية</header>

  <div class="articles-container">
    <div class="article-card">
      <h3>أساسيات البرمجة للمبتدئين</h3>
      <p>مقال يشرح المفاهيم الأساسية في البرمجة بلغة بسيطة مناسبة لكل المبتدئين.</p>
      <a href="article1.html">اقرأ المقال</a>
    </div>

    <div class="article-card">
      <h3>كيف تبدأ مشروعك البرمجي</h3>
      <p>نصائح وخطوات عملية للبدء في مشروع برمجي ناجح.</p>
      <a href="article2.html">اقرأ المقال</a>
    </div>
  </div>

  <footer>
    جميع الحقوق محفوظة &copy; Fabrica 2025
  </footer>
</body>
</html>
